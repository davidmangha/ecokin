<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoKin - Profil utilisateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body data-page="profil">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/index.html">EcoKin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Afficher le menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" data-page-link="accueil" href="/index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" data-page-link="carte" href="/carte.html">Carte</a></li>
          <li class="nav-item"><a class="nav-link" data-page-link="sensibilisation" href="/sensibilisation.html">Sensibilisation</a></li>
          <li class="nav-item d-none" data-auth-only><a class="nav-link" data-page-link="dashboard" href="/dashboard.html">Tableau de bord</a></li>
          <li class="nav-item d-none" data-auth-only><a class="nav-link" data-page-link="signaler" href="/signaler.html">Signaler</a></li>
          <li class="nav-item d-none" data-admin-only><a class="nav-link" data-page-link="administration" href="/administration.html">Administration</a></li>
          <li class="nav-item dropdown d-none" data-auth-only>
            <button class="btn btn-outline-primary dropdown-toggle" data-bs-toggle="dropdown"><span data-user-label>Compte</span></button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/profil.html">Profil utilisateur</a></li>
              <li><button class="dropdown-item" data-logout>Deconnexion</button></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <section class="surface p-4 p-md-5">
            <h1 class="section-title h2 mb-2">Profil utilisateur</h1>
            <p class="text-muted mb-4">Mettez a jour vos informations et votre commune de reference.</p>
            <div id="profileAlert"></div>
            <form id="profileForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="nom">Nom complet</label>
                <input class="form-control" id="nom" name="nom" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="telephone">Telephone</label>
                <input class="form-control" id="telephone" name="telephone">
              </div>
              <div class="col-12">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" disabled>
              </div>
              <div class="col-12">
                <label class="form-label" for="commune_id">Commune</label>
                <select class="form-select commune-select" id="commune_id" name="commune_id"></select>
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-primary btn-lg" type="submit"><i class="bi bi-save me-2"></i>Enregistrer</button>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js"></script>
  <script src="/public/js/app.js"></script>
</body>
</html>
