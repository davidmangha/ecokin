<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoKin - Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body data-page="connexion">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/index.html">EcoKin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Afficher le menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" data-page-link="accueil" href="/index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" data-page-link="carte" href="/carte.html">Carte</a></li>
          <li class="nav-item"><a class="nav-link" data-page-link="sensibilisation" href="/sensibilisation.html">Sensibilisation</a></li>
          <li class="nav-item" data-guest-only><a class="btn btn-primary" href="/inscription.html">Inscription</a></li>
          <li class="nav-item dropdown d-none" data-auth-only>
            <button class="btn btn-outline-primary dropdown-toggle" data-bs-toggle="dropdown"><span data-user-label>Compte</span></button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/profil.html">Profil utilisateur</a></li>
              <li><button class="dropdown-item" data-logout>Deconnexion</button></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <section class="surface p-4 p-md-5">
            <h1 class="section-title h2 mb-2">Connexion</h1>
            <p class="text-muted mb-4">Accedez a votre tableau de bord EcoKin.</p>
            <div id="loginAlert"></div>
            <form id="loginForm" class="row g-3">
              <div class="col-12">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required>
              </div>
              <div class="col-12">
                <label class="form-label" for="password">Mot de passe</label>
                <input class="form-control" id="password" name="password" type="password" required>
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-primary btn-lg" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Se connecter</button>
              </div>
              <div class="col-12">
                <a href="/inscription.html">Creer un compte</a>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js"></script>
  <script src="/public/js/app.js"></script>
</body>
</html>
